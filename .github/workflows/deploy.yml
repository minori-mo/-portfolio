name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
        timeout-minutes: 5
      - name: Generate static site
        run: timeout 120 pnpm run generate || test -d .output/public
        timeout-minutes: 10
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        timeout-minutes: 5
        with:
          path: './.output/public'
      - id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 5
